# Production nginx config — HTTPS + reverse proxy.
# Requires TLS certs from certbot (run init.conf bootstrap first).
# Place at /opt/mpbt/nginx/default.conf after certs are obtained.

# HTTP — ACME challenge passthrough + redirect everything else to HTTPS.
server {
    listen 80;
    server_name play-solaris.com api.play-solaris.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# play-solaris.com — Next.js SSR frontend.
server {
    listen 443 ssl;
    server_name play-solaris.com;

    ssl_certificate     /etc/letsencrypt/live/play-solaris.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/play-solaris.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# api.play-solaris.com — NestJS API (direct browser access + CORS).
server {
    listen 443 ssl;
    server_name api.play-solaris.com;

    ssl_certificate     /etc/letsencrypt/live/play-solaris.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/play-solaris.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

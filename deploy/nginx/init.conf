# Bootstrap nginx config — HTTP only.
# Used only to let certbot complete the initial webroot challenge.
#
# One-time usage (from /opt/mpbt/):
#   cp deploy/nginx/init.conf nginx/default.conf
#   docker compose up -d nginx certbot
#   docker compose exec certbot certbot certonly --webroot \
#     -w /var/www/certbot \
#     -d play-solaris.com -d api.play-solaris.com \
#     --email YOUR@EMAIL.COM --agree-tos --no-eff-email
#   cp deploy/nginx/play-solaris.conf nginx/default.conf
#   docker compose exec nginx nginx -s reload

server {
    listen 80;
    server_name play-solaris.com api.play-solaris.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'Bootstrapping TLS — please wait.\n';
        add_header Content-Type text/plain;
    }
}
